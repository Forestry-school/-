<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>福瑞斯特中小學 - 點心訂餐系統</title>
    <style>
        /* CSS 樣式完全沒變，保持精美 */
        body { font-family: 'Microsoft JhengHei', sans-serif; background-color: #f0f2f5; padding: 15px; color: #333; margin: 0; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 8px 16px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #1a73e8; margin-bottom: 5px; font-size: 22px; }
        .sub-title { text-align:center; font-weight:bold; font-size:20px; margin-bottom:15px; color: #333; }
        
        .countdown-box { background: #ffebee; border: 2px solid #ef5350; color: #c62828; text-align: center; padding: 10px; border-radius: 8px; font-weight: bold; font-size: 16px; margin-bottom: 20px; display: none; /* 預設隱藏，抓到資料才顯示 */ }
        .countdown-time { font-size: 20px; margin-top: 5px; display: block; }

        .desc { font-size: 15px; color: #5f6368; line-height: 1.6; margin-bottom: 25px; background: #fffbe6; padding: 15px; border-radius: 8px; border: 1px solid #ffe58f; }
        
        .menu-section { text-align: center; margin-bottom: 30px; padding: 10px; border: 1px solid #ddd; border-radius: 8px; background: #fafafa; }
        .menu-section h3 { margin-top: 0; font-size: 18px; color: #444; }
        .menu-img { max-width: 100%; height: auto; border-radius: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); cursor: zoom-in; display: none; /* 預設隱藏，抓到圖片才顯示 */ }
        .click-hint { font-size: 13px; color: #1a73e8; margin-top: 8px; display: block; font-weight: bold; }

        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.85); overflow: hidden; }
        .modal-content { margin: auto; display: block; max-width: 95%; max-height: 90vh; position: relative; top: 50%; transform: translateY(-50%); border-radius: 8px; }
        .close-btn { position: absolute; top: 15px; right: 25px; color: white; font-size: 40px; font-weight: bold; cursor: pointer; text-shadow: 0 2px 4px rgba(0,0,0,0.5); z-index: 1001; }
        
        .form-group { margin-bottom: 25px; }
        .form-group b { display: block; margin-bottom: 8px; font-size: 16px; }
        input[type="text"] { width: 100%; padding: 12px; font-size: 16px; border: 2px solid #dfe1e5; border-radius: 8px; box-sizing: border-box; }
        input[type="text"]:focus { border-color: #1a73e8; outline: none; }

        .info-box { background: #e8f0fe; padding: 20px; border-radius: 10px; margin-bottom: 25px; border-left: 5px solid #1a73e8; }
        .info-box span { display: block; font-size: 17px; margin-bottom: 8px; font-weight: bold; }
        .note-red { color: #d93025; font-size: 18px; }

        .radio-group { background: #f8f9fa; padding: 15px; border-radius: 8px; }
        label { margin-right: 20px; font-size: 16px; cursor: pointer; display: inline-block; padding: 5px 0; }
        input[type="radio"] { transform: scale(1.2); margin-right: 5px; }

        button { width: 100%; padding: 15px; font-size: 18px; font-weight: bold; background-color: #34a853; color: white; border: none; border-radius: 8px; cursor: pointer; }
        button:hover { background-color: #2d8e47; }
        button:disabled { background-color: #999; cursor: not-allowed; }
        .footer-note { text-align: center; font-size: 12px; color: #999; margin-top: 20px; }
    </style>
</head>
<body>

<div id="imageModal" class="modal" onclick="closeModal()">
    <span class="close-btn" onclick="closeModal()">&times;</span>
    <img class="modal-content" id="zoomedImg">
</div>

<div class="container">
    <h2>新北市福瑞斯特高級中學國小部</h2>
    <div id="dynamic_title" class="sub-title">雲端資料載入中...</div>
    
    <div class="countdown-box" id="countdown_container">
        ⏳ 報名截止時間：<span id="deadline_text">載入中</span>
        <span class="countdown-time" id="countdown_timer">計算中...</span>
    </div>

    <div class="desc">
        親愛的家長您好：<br>
        為了解孩子們對於下午點心的需求與意願，請您協助填寫勾選，以便我們能夠更好地安排下午點心的服務。下午點心時間為：15:40~15:55，感謝您的配合與支持！
    </div>

    <div class="menu-section">
        <h3 id="menu_title">📅 點心菜單載入中...</h3>
        <img id="dynamic_menu_img" src="" alt="菜單" class="menu-img" onclick="openModal()">
        <span class="click-hint" id="click_hint_text" style="display:none;">👆 點擊圖片可放大查看</span>
    </div>

    <div class="form-group">
        <b>輸入班級座號：</b>
        <input type="text" id="student_id" placeholder="例如：50101 (輸入後點擊空白處)" onblur="searchStudent()" disabled>
    </div>

    <div class="info-box">
        <span id="display_name">學生姓名：(等待系統就緒...)</span>
        <span id="display_note" class="note-red">系統飲食備註：(等待系統就緒...)</span>
    </div>

    <div class="form-group">
        <b>(1) 是否訂購當月的點心？</b>
        <div class="radio-group">
            <label><input type="radio" name="order" value="是" onclick="toggleFoodType()" disabled> 是</label>
            <label><input type="radio" name="order" value="否" onclick="toggleFoodType()" disabled> 否</label>
        </div>
    </div>

    <div class="form-group" id="food_type_section" style="display: none;">
        <b>(2) 點心餐點：</b>
        <div class="radio-group">
            <label><input type="radio" name="type" value="葷" checked> 葷</label>
            <label><input type="radio" name="type" value="素"> 素</label>
        </div>
    </div>

    <div class="form-group">
        <b>(3) 家長備註：</b>
        <input type="text" id="parent_remark" placeholder="若有其他特別需求請填寫於此 (選填)" disabled>
    </div>

    <button onclick="submitData()" id="submitBtn" disabled>資料載入中，請稍候...</button>
    
    <div class="footer-note">製作人：TATA版本 (雲端連動版)</div>
</div>

<script>
    // ⚠️ 這裡只需要貼上你的 Apps Script 網址，其他通通不用改了！
    const GOOGLE_API_URL = "https://script.google.com/macros/s/AKfycbzANxRbt7gHmuZR7G2icmjz9pPBntH1A2Esg5Q8YNL-VBvwju5aF4hpEZ5q5ZTalhNE/exec";
    
    let studentData = {};
    let systemConfig = {};
    let countdownInterval;

    window.onload = function() {
        // 現在改呼叫 getInitialData，一次把設定跟名單抓回來
        fetch(GOOGLE_API_URL + "?action=getInitialData")
            .then(res => res.json())
            .then(data => {
                studentData = data.students;
                systemConfig = data.config;
                
                // 1. 替換文字與圖片 (抓取試算表設定)
                document.getElementById('dynamic_title').innerText = systemConfig.monthName + "點心訂購單";
                document.getElementById('menu_title').innerText = "📅 " + systemConfig.monthName + "點心菜單";
                
                const menuImg = document.getElementById('dynamic_menu_img');
                menuImg.src = systemConfig.menuImage;
                menuImg.style.display = "inline-block"; // 圖片抓到後才顯示
                document.getElementById('click_hint_text').style.display = "block";
                document.getElementById('zoomedImg').src = systemConfig.menuImage;

                document.getElementById('deadline_text').innerText = systemConfig.deadline.replace('T', ' ');
                document.getElementById('countdown_container').style.display = "block";

                // 2. 解除表單鎖定
                document.getElementById('student_id').disabled = false;
                document.getElementById('parent_remark').disabled = false;
                document.querySelectorAll('input[name="order"]').forEach(radio => radio.disabled = false);
                document.getElementById('display_name').innerText = "學生姓名：(請輸入班級座號)";
                document.getElementById('display_note').innerText = "系統飲食備註：(請輸入班級座號)";

                // 3. 啟動倒數計時
                countdownInterval = setInterval(updateCountdown, 1000);
                updateCountdown(); // 馬上先執行一次，避免閃爍
            })
            .catch(err => {
                console.error(err);
                alert("無法連線至 Google 試算表，請檢查設定");
            });
    }

    function openModal() { document.getElementById('imageModal').style.display = "block"; }
    function closeModal() { document.getElementById('imageModal').style.display = "none"; }

    function updateCountdown() {
        const dest = new Date(systemConfig.deadline).getTime();
        const now = new Date().getTime();
        const distance = dest - now;

        const countdownTimer = document.getElementById('countdown_timer');
        const container = document.getElementById('countdown_container');
        const btn = document.getElementById('submitBtn');

        if (distance < 0) {
            countdownTimer.innerHTML = "🚫 本次報名已結束！";
            container.style.backgroundColor = "#e0e0e0";
            container.style.borderColor = "#9e9e9e";
            container.style.color = "#757575";
            btn.disabled = true;
            btn.innerText = "報名時間已截止";
            btn.style.backgroundColor = "#999";
            
            // 截止後將輸入框全部鎖定
            document.getElementById('student_id').disabled = true;
            document.querySelectorAll('input[name="order"]').forEach(r => r.disabled = true);
            clearInterval(countdownInterval); // 停止計時器
            return;
        }

        const days = Math.floor(distance / (1000 * 60 * 60 * 24));
        const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((distance % (1000 * 60)) / 1000);

        countdownTimer.innerHTML = `倒數：${days} 天 ${hours} 小時 ${minutes} 分 ${seconds} 秒`;
        
        // 時間還沒到，保持按鈕暢通
        btn.disabled = false;
        btn.innerText = "確認送出報名資料";
    }

    function searchStudent() {
        const id = document.getElementById('student_id').value.trim();
        const nameEl = document.getElementById('display_name');
        const noteEl = document.getElementById('display_note');

        if (studentData[id]) {
            nameEl.innerText = "學生姓名：" + studentData[id].name;
            noteEl.innerText = "系統飲食備註：" + studentData[id].note;
        } else if (id !== "") {
            nameEl.innerText = "學生姓名：(查無此座號)";
            noteEl.innerText = "系統飲食備註：(請檢查輸入是否正確)";
        }
    }

    function toggleFoodType() {
        const orderChecked = document.querySelector('input[name="order"]:checked');
        const foodTypeSection = document.getElementById('food_type_section');
        if (orderChecked && orderChecked.value === '是') {
            foodTypeSection.style.display = 'block';
        } else {
            foodTypeSection.style.display = 'none';
        }
    }

    function submitData() {
        const id = document.getElementById('student_id').value.trim();
        if (!studentData[id]) { alert("請先輸入正確的班級座號！"); return; }

        const orderChecked = document.querySelector('input[name="order"]:checked');
        if (!orderChecked) { alert("請勾選「是否訂購當月點心」"); return; }

        const order = orderChecked.value;
        let type = "無";
        if (order === '是') {
            type = document.querySelector('input[name="type"]:checked').value;
        }
        
        const name = studentData[id].name;
        const note = studentData[id].note;
        const remark = document.getElementById('parent_remark').value.trim();
        const btn = document.getElementById('submitBtn');

        btn.innerText = "正在上傳資料...";
        btn.disabled = true;

        const url = `${GOOGLE_API_URL}?action=addOrder&id=${id}&name=${encodeURIComponent(name)}&order=${encodeURIComponent(order)}&type=${encodeURIComponent(type)}&note=${encodeURIComponent(note)}&remark=${encodeURIComponent(remark)}`;

        fetch(url)
            .then(res => res.text())
            .then(result => {
                alert("【" + name + "】同學，報名資料已成功傳送！");
                location.reload(); 
            })
            .catch(err => {
                alert("傳送失敗，請稍後再試");
                btn.innerText = "確認送出報名資料";
                btn.disabled = false;
            });
    }
</script>

</body>
</html>
